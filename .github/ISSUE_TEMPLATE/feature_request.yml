name: ✨ Feature Request
description: Suggest an idea or a new feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 您的需求是否與特定問題有關？
      description: 請清楚簡潔地描述問題所在。
      placeholder: 例如：我總是在...時覺得很不方便。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 您希望看到的解決方案或功能
      description: 請清楚簡潔地描述您希望達成的效果。
  - type: textarea
    id: alternatives
    attributes:
      label: 其他替代方案
      description: 請描述您考慮過的任何替代解決方案或功能。
  - type: textarea
    id: context
    attributes:
      label: 補充資訊
      description: 在此添加關於此功能請求的任何其他內容或截圖。
