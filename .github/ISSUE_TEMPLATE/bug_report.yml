name: 🐛 Bug Report
description: Report a bug to help us improve Aegis Guardian
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感謝您撥冗回報 Bug！請儘可能提供詳細資訊。
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 請清楚簡潔地描述 Bug 是什麼。
      placeholder: 例如：在啟動時發生崩潰...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 作業系統與版本
      placeholder: 例如：macOS 14.2.1 (Sonoma)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 重現步驟
      description: 請詳述如何重現此問題。
      placeholder: |
        1. 啟動 `python core/main.py`
        2. 點擊...
        3. 看到錯誤...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 錯誤日誌 (Logs)
      description: 如果有錯誤訊息或日誌，請貼在此處。
      placeholder: |
        ```text
        Traceback (most recent call last):
          File "core/main.py", line 42...
        ```
  - type: checkboxes
    id: checks
    attributes:
      label: 確認清單
      options:
        - label: 我已檢查過現有的 Issue，確認這不是重複的回報。
          required: true
        - label: 我使用的是最新版本的程式碼。
          required: true
